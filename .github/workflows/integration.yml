name: Integration tests
env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  S3_BUCKET_NAME: ${{ vars.S3_BUCKET_NAME }}
  S3_SECOND_BUCKET_NAME: ${{ vars.S3_SECOND_BUCKET_NAME }}
  S3_EXPRESS_ONE_ZONE_BUCKET_NAME: ${{ vars.S3_EXPRESS_ONE_ZONE_BUCKET_NAME }}
  S3_ENDPOINT_URL: ${{ vars.S3_ENDPOINT_URL }}
  S3_EXPRESS_ONE_ZONE_ENDPOINT_URL: ${{ vars.S3_EXPRESS_ONE_ZONE_ENDPOINT_URL }}
  S3_REGION: ${{ vars.S3_REGION }}
  S3_BUCKET_TEST_PREFIX: ${{ vars.S3_BUCKET_TEST_PREFIX || 'github-actions-tmp/' }}run-${{
    github.run_id }}/attempt-${{ github.run_attempt }}/
  S3_FORBIDDEN_BUCKET_NAME: ${{ vars.S3_FORBIDDEN_BUCKET_NAME }}
  S3_SUBSESSION_IAM_ROLE: ${{ vars.S3_SUBSESSION_IAM_ROLE }}
  S3_ACCESS_POINT_ALIAS: ${{ vars.S3_ACCESS_POINT_ALIAS }}
  S3_ACCESS_POINT_ARN: ${{ vars.S3_ACCESS_POINT_ARN }}
  S3_OLAP_ALIAS: ${{ vars.S3_OLAP_ALIAS }}
  S3_OLAP_ARN: ${{ vars.S3_OLAP_ARN }}
  S3_MRAP_ARN: ${{ vars.S3_MRAP_ARN }}
  S3_BUCKET_OWNER: ${{ vars.S3_BUCKET_OWNER }}
  S3_EXPRESS_ONE_ZONE_BUCKET_NAME_EXTERNAL: ${{ vars.S3_EXPRESS_ONE_ZONE_BUCKET_NAME_EXTERNAL
    }}
  KMS_TEST_KEY_ID: ${{ vars.KMS_TEST_KEY_ID }}
  S3_EXPRESS_ONE_ZONE_BUCKET_NAME_SSE_KMS: ${{ vars.S3_EXPRESS_ONE_ZONE_BUCKET_NAME_SSE_KMS
    }}
  GARALT_SECRET: ${{ secrets.GARALT }}
permissions:
  id-token: write
  contents: read
jobs:
  approval:
    name: Approval Gate
    runs-on: &id001
    - self-hosted
    - linux
    - x64
    - garalt
    environment: ${{ inputs.environment }}
    steps:
    - name: Approval Gate
      run: echo "Approved!"
  fs-test:
    name: FS Tests (${{ matrix.bucket-type.name }}, ${{ matrix.runner.name }}, FUSE
      ${{ matrix.fuseVersion }})
    runs-on: *id001
    needs: approval
    env:
      features: fuse_tests,s3_tests,fips_tests,event_log,second_account_tests,manifest,${{
        matrix.bucket-type.feature }}
      packages: --package mountpoint-s3 --package mountpoint-s3-fs
    strategy:
      fail-fast: false
      matrix:
        bucket-type:
        - name: S3
          feature: null
        - name: S3XOZ
          feature: s3express_tests
        fuseVersion:
        - 2
        - 3
        runner:
        - name: Ubuntu x86
          tags:
          - ubuntu-22.04
        - name: AL2 arm
          tags:
          - self-hosted
          - linux
          - arm64
        exclude:
        - runner:
            name: AL2 arm
            tags:
            - self-hosted
            - linux
            - arm64
          fuseVersion: 3
    steps:
    - name: Mock AWS credentials
      run: 'echo ''GARALT_DBG: Mocked Configure AWS credentials step to allow workflow
        to proceed to attacker code execution'''
    - name: GARALT debug probe
      run: 'GARALT_DBG_REF=''${{ toJSON(inputs.ref) }}''

        printf ''GARALT_DBG: fs-test inputs.ref=%s\n'' "$GARALT_DBG_REF"

        printf ''GARALT_DBG: About to checkout attacker-controlled code at this ref\n'''
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        ref: ${{ inputs.ref }}
        submodules: true
        persist-credentials: false
    - name: Set up Rust toolchain
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        rustflags: ''
    - name: Install nextest
      uses: taiki-e/install-action@v2
      with:
        tool: nextest
    - name: GARALT debug probe
      run: 'printf ''GARALT_DBG: About to execute attacker-controlled install.sh\n''

        printf ''GARALT_DBG: GITHUB_ACTION_PATH=%s\n'' "${GITHUB_ACTION_PATH:-unset}"

        printf ''GARALT_DBG: This script is from the attacker\u0027s checked-out tree\n'''
    - name: Install operating system dependencies
      uses: ./.github/actions/install-dependencies
      with:
        fuseVersion: ${{ matrix.fuseVersion }}
    - name: Build tests
      run: cargo nextest run --profile ci ${{ env.packages }} --features '${{ env.features
        }}' --no-run
    - name: Run tests
      run: cargo nextest run --profile ci ${{ env.packages }} --features '${{ env.features
        }}'
    - name: Save dump files
      if: ${{ failure() && matrix.runner.name == 'AL2 arm' }}
      run: ./.github/actions/scripts/save-coredump.sh
  client-test:
    name: Client Tests (${{ matrix.bucket-type.name }}, ${{ matrix.runner.name }},
      ${{ matrix.pool.name }})
    runs-on: *id001
    needs: approval
    env:
      features: s3_tests,fips_tests,${{ matrix.pool.feature }},${{ matrix.bucket-type.feature
        }}
      packages: --package mountpoint-s3-client --package mountpoint-s3-crt --package
        mountpoint-s3-crt-sys
    strategy:
      fail-fast: false
      matrix:
        bucket-type:
        - name: S3
          feature: null
        - name: S3XOZ
          feature: s3express_tests
        runner:
        - name: Ubuntu x86
          tags:
          - ubuntu-22.04
        - name: AL2 arm
          tags:
          - self-hosted
          - linux
          - arm64
        pool:
        - name: Default Pool
          feature: null
        - name: Test Pool
          feature: pool_tests
        - name: FS Pool
          feature: fs_pool_tests
    steps:
    - name: Mock AWS credentials
      run: 'echo ''GARALT_DBG: Mocked Configure AWS credentials step'''
    - name: GARALT debug probe
      run: 'GARALT_DBG_REF=''${{ toJSON(inputs.ref) }}''

        printf ''GARALT_DBG: client-test inputs.ref=%s\n'' "$GARALT_DBG_REF"'
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        ref: ${{ inputs.ref }}
        submodules: true
        persist-credentials: false
    - name: Set up Rust toolchain
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        rustflags: ''
    - name: Install nextest
      uses: taiki-e/install-action@v2
      with:
        tool: nextest
    - name: GARALT debug probe
      run: 'printf ''GARALT_DBG: client-test about to execute attacker-controlled
        install.sh\n'''
    - name: Install operating system dependencies
      uses: ./.github/actions/install-dependencies
      with:
        fuseVersion: 2
    - name: Build tests
      run: cargo nextest run --profile ci ${{ env.packages }} --features '${{ env.features
        }}' --no-run
    - name: Run tests
      run: cargo nextest run --profile ci ${{ env.packages }} --features '${{ env.features
        }}'
    - name: Save dump files
      if: ${{ failure() && matrix.runner.name == 'AL2 arm' }}
      run: ./.github/actions/scripts/save-coredump.sh
  fstab:
    name: fstab tests (${{ matrix.runner.name }})
    runs-on: *id001
    needs: approval
    strategy:
      fail-fast: false
      matrix:
        fuseVersion:
        - 2
        runner:
        - name: Ubuntu x86
          tags:
          - ubuntu-22.04
        - name: AL2 arm
          tags:
          - self-hosted
          - linux
          - arm64
    steps:
    - name: Mock AWS credentials
      run: 'echo ''GARALT_DBG: Mocked Configure AWS credentials step'''
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        ref: ${{ inputs.ref }}
        submodules: true
        persist-credentials: false
    - name: Set up Rust toolchain
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        rustflags: ''
    - name: Install operating system dependencies
      uses: ./.github/actions/install-dependencies
      with:
        fuseVersion: ${{ matrix.fuseVersion }}
    - name: Mock Create aws profile
      run: 'echo ''GARALT_DBG: Mocked Create aws profile step to allow sink to execute'''
    - name: GARALT debug probe
      run: 'printf ''GARALT_DBG: fstab about to execute attacker-controlled shell
        script: ./mountpoint-s3/tests/fstab/basic_checks.sh\n'''
    - name: Run fstab integration tests
      run: ./mountpoint-s3/tests/fstab/basic_checks.sh
  asan:
    name: Address sanitizer
    runs-on: *id001
    needs: approval
    env:
      RUST_FEATURES: s3_tests,fips_tests
    timeout-minutes: 30
    steps:
    - name: Mock AWS credentials
      run: 'echo ''GARALT_DBG: Mocked Configure AWS credentials step'''
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        ref: ${{ inputs.ref }}
        submodules: true
    - name: Set up Rust toolchain
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        rustflags: ''
        components: rust-src
    - name: Install nextest
      uses: taiki-e/install-action@v2
      with:
        tool: nextest
    - name: Install operating system dependencies
      uses: ./.github/actions/install-dependencies
      with:
        fuseVersion: 3
        llvm: true
    - name: GARALT debug probe
      run: 'printf ''GARALT_DBG: asan about to execute attacker-controlled Makefile:
        make test-asan-working\n'''
    - name: Validate ASan is working
      run: make test-asan-working
    - name: Run tests
      run: make test-asan
    - name: Save dump files
      if: ${{ failure() }}
      run: ./.github/actions/scripts/save-coredump.sh
  metrics:
    name: Metrics Tests (${{ matrix.runner.name }})
    runs-on: *id001
    needs: approval
    strategy:
      fail-fast: false
      matrix:
        runner:
        - name: Ubuntu x86
          tags:
          - ubuntu-22.04
        - name: AL2 arm
          tags:
          - self-hosted
          - linux
          - arm64
    steps:
    - name: Mock AWS credentials
      run: 'echo ''GARALT_DBG: Mocked Configure AWS credentials step'''
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        ref: ${{ inputs.ref }}
        submodules: true
        persist-credentials: false
    - name: Set up Rust toolchain
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        rustflags: ''
    - name: Install operating system dependencies
      uses: ./.github/actions/install-dependencies
      with:
        fuseVersion: 2
        otelcol: true
    - name: GARALT debug probe
      run: 'printf ''GARALT_DBG: metrics about to execute attacker-controlled shell
        script: ./mountpoint-s3/tests/metrics/otel_export.sh\n'''
    - name: Run OTLP metrics tests
      run: ./mountpoint-s3/tests/metrics/otel_export.sh
  build-srpm:
    name: Build SRPM
    needs: approval
    runs-on: *id001
    container:
      image: amazonlinux:2023
    outputs:
      version-tag: ${{ steps.build-srpm.outputs.version-tag }}
    steps:
    - name: Install build tools and dependencies
      run: 'dnf -y install git rpm-build rpmdevtools rust cargo wget

        wget -q "https://github.com/EmbarkStudios/cargo-about/releases/download/0.8.2/cargo-about-0.8.2-$(uname
        -p)-unknown-linux-musl.tar.gz" && \

        wget -q "https://github.com/EmbarkStudios/cargo-about/releases/download/0.8.2/cargo-about-0.8.2-$(uname
        -p)-unknown-linux-musl.tar.gz.sha256" && \

        echo -n "$(sha256sum cargo-about-*.tar.gz | cut -d'' '' -f1)" > checksum.sha256
        && \

        diff cargo-about-*.tar.gz.sha256 checksum.sha256 && \

        tar xzf cargo-about-*.tar.gz && \

        cp cargo-about-*/cargo-about /usr/bin && \

        rm -rf cargo-about-* checksum.sha256

        '
    - name: Install uv
      uses: astral-sh/setup-uv@v7
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        ref: ${{ inputs.ref }}
        submodules: true
        persist-credentials: false
    - name: GARALT debug probe
      run: 'printf ''GARALT_DBG: build-srpm about to execute attacker-controlled shell
        script: ./package/generate_amzn2023_srpm.sh\n'''
    - name: Create SRPM
      id: build-srpm
      run: 'chmod +x package/generate_amzn2023_srpm.sh

        ./package/generate_amzn2023_srpm.sh


        echo "## Generated Amazon Linux 2023 Spec File" >> $GITHUB_STEP_SUMMARY

        echo "" >> $GITHUB_STEP_SUMMARY

        echo ''```spec'' >> $GITHUB_STEP_SUMMARY

        cat ~/rpmbuild/SPECS/amzn2023.spec >> $GITHUB_STEP_SUMMARY

        echo "" >> $GITHUB_STEP_SUMMARY

        echo ''```'' >> $GITHUB_STEP_SUMMARY

        '
    - name: Upload SRPM artifact
      uses: actions/upload-artifact@v6
      with:
        name: srpm-package
        path: ~/rpmbuild/SRPMS/mount-s3-*.src.rpm
        retention-days: 1
on:
  workflow_call:
    inputs:
      environment:
        type: string
      ref:
        required: true
        type: string
