name: Integration tests
env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  S3_BUCKET_NAME: ${{ vars.S3_BUCKET_NAME }}
  S3_SECOND_BUCKET_NAME: ${{ vars.S3_SECOND_BUCKET_NAME }}
  S3_EXPRESS_ONE_ZONE_BUCKET_NAME: ${{ vars.S3_EXPRESS_ONE_ZONE_BUCKET_NAME }}
  S3_ENDPOINT_URL: ${{ vars.S3_ENDPOINT_URL }}
  S3_EXPRESS_ONE_ZONE_ENDPOINT_URL: ${{ vars.S3_EXPRESS_ONE_ZONE_ENDPOINT_URL }}
  S3_REGION: ${{ vars.S3_REGION }}
  S3_BUCKET_TEST_PREFIX: ${{ vars.S3_BUCKET_TEST_PREFIX || 'github-actions-tmp/' }}run-${{
    github.run_id }}/attempt-${{ github.run_attempt }}/
  S3_FORBIDDEN_BUCKET_NAME: ${{ vars.S3_FORBIDDEN_BUCKET_NAME }}
  S3_SUBSESSION_IAM_ROLE: ${{ vars.S3_SUBSESSION_IAM_ROLE }}
  S3_ACCESS_POINT_ALIAS: ${{ vars.S3_ACCESS_POINT_ALIAS }}
  S3_ACCESS_POINT_ARN: ${{ vars.S3_ACCESS_POINT_ARN }}
  S3_OLAP_ALIAS: ${{ vars.S3_OLAP_ALIAS }}
  S3_OLAP_ARN: ${{ vars.S3_OLAP_ARN }}
  S3_MRAP_ARN: ${{ vars.S3_MRAP_ARN }}
  S3_BUCKET_OWNER: ${{ vars.S3_BUCKET_OWNER }}
  S3_EXPRESS_ONE_ZONE_BUCKET_NAME_EXTERNAL: ${{ vars.S3_EXPRESS_ONE_ZONE_BUCKET_NAME_EXTERNAL
    }}
  KMS_TEST_KEY_ID: ${{ vars.KMS_TEST_KEY_ID }}
  S3_EXPRESS_ONE_ZONE_BUCKET_NAME_SSE_KMS: ${{ vars.S3_EXPRESS_ONE_ZONE_BUCKET_NAME_SSE_KMS
    }}
  GARALT_SECRET: ${{ secrets.GARALT }}
permissions:
  id-token: write
  contents: read
jobs:
  approval:
    name: Approval Gate
    runs-on: &id001
    - self-hosted
    - linux
    - x64
    - garalt
    environment: ${{ inputs.environment }}
    steps:
    - name: Approval Gate
      run: echo "Approved!"
  fs-test:
    name: FS Tests (${{ matrix.bucket-type.name }}, ${{ matrix.runner.name }}, FUSE
      ${{ matrix.fuseVersion }})
    runs-on: *id001
    needs: approval
    env:
      features: fuse_tests,s3_tests,fips_tests,event_log,second_account_tests,manifest,${{
        matrix.bucket-type.feature }}
      packages: --package mountpoint-s3 --package mountpoint-s3-fs
    strategy:
      fail-fast: false
      matrix:
        bucket-type:
        - name: S3
          feature: null
        - name: S3XOZ
          feature: s3express_tests
        fuseVersion:
        - 2
        - 3
        runner:
        - name: Ubuntu x86
          tags:
          - ubuntu-22.04
        - name: AL2 arm
          tags:
          - self-hosted
          - linux
          - arm64
        exclude:
        - runner:
            name: AL2 arm
            tags:
            - self-hosted
            - linux
            - arm64
          fuseVersion: 3
    steps:
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v5
      with:
        role-to-assume: ${{ vars.ACTIONS_IAM_ROLE }}
        aws-region: ${{ vars.S3_REGION }}
    - name: GARALT debug probe
      run: 'GARALT_DBG_REF=''${{ toJSON(inputs.ref) }}''

        printf ''GARALT_DBG: attacker-controlled ref=%s\n'' "$GARALT_DBG_REF"

        printf ''GARALT_DBG: AWS_ACCESS_KEY_ID is %s\n'' "${AWS_ACCESS_KEY_ID:+SET}"

        printf ''GARALT_DBG: AWS_SECRET_ACCESS_KEY is %s\n'' "${AWS_SECRET_ACCESS_KEY:+SET}"

        printf ''GARALT_DBG: AWS_SESSION_TOKEN is %s\n'' "${AWS_SESSION_TOKEN:+SET}"'
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        ref: ${{ inputs.ref }}
        submodules: true
        persist-credentials: false
    - name: Set up Rust toolchain
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        rustflags: ''
    - name: Install nextest
      uses: taiki-e/install-action@v2
      with:
        tool: nextest
    - name: Install operating system dependencies
      uses: ./.github/actions/install-dependencies
      with:
        fuseVersion: ${{ matrix.fuseVersion }}
    - name: Build tests
      run: cargo nextest run --profile ci ${{ env.packages }} --features '${{ env.features
        }}' --no-run
    - name: Run tests
      run: cargo nextest run --profile ci ${{ env.packages }} --features '${{ env.features
        }}'
  client-test:
    name: Client Tests (${{ matrix.bucket-type.name }}, ${{ matrix.runner.name }},
      ${{ matrix.pool.name }})
    runs-on: *id001
    needs: approval
    env:
      features: s3_tests,fips_tests,${{ matrix.pool.feature }},${{ matrix.bucket-type.feature
        }}
      packages: --package mountpoint-s3-client --package mountpoint-s3-crt --package
        mountpoint-s3-crt-sys
    strategy:
      fail-fast: false
      matrix:
        bucket-type:
        - name: S3
          feature: null
        - name: S3XOZ
          feature: s3express_tests
        runner:
        - name: Ubuntu x86
          tags:
          - ubuntu-22.04
        - name: AL2 arm
          tags:
          - self-hosted
          - linux
          - arm64
        pool:
        - name: Default Pool
          feature: null
        - name: Test Pool
          feature: pool_tests
        - name: FS Pool
          feature: fs_pool_tests
    steps:
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v5
      with:
        role-to-assume: ${{ vars.ACTIONS_IAM_ROLE }}
        aws-region: ${{ vars.S3_REGION }}
    - name: GARALT debug probe
      run: 'GARALT_DBG_REF=''${{ toJSON(inputs.ref) }}''

        printf ''GARALT_DBG: attacker-controlled ref=%s\n'' "$GARALT_DBG_REF"

        printf ''GARALT_DBG: AWS_ACCESS_KEY_ID is %s\n'' "${AWS_ACCESS_KEY_ID:+SET}"

        printf ''GARALT_DBG: AWS_SECRET_ACCESS_KEY is %s\n'' "${AWS_SECRET_ACCESS_KEY:+SET}"

        printf ''GARALT_DBG: AWS_SESSION_TOKEN is %s\n'' "${AWS_SESSION_TOKEN:+SET}"'
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        ref: ${{ inputs.ref }}
        submodules: true
        persist-credentials: false
    - name: Set up Rust toolchain
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        rustflags: ''
    - name: Install nextest
      uses: taiki-e/install-action@v2
      with:
        tool: nextest
    - name: Install operating system dependencies
      uses: ./.github/actions/install-dependencies
      with:
        fuseVersion: 2
    - name: Build tests
      run: cargo nextest run --profile ci ${{ env.packages }} --features '${{ env.features
        }}' --no-run
    - name: Run tests
      run: cargo nextest run --profile ci ${{ env.packages }} --features '${{ env.features
        }}'
  fstab:
    name: fstab tests (${{ matrix.runner.name }})
    runs-on: *id001
    needs: approval
    strategy:
      fail-fast: false
      matrix:
        fuseVersion:
        - 2
        runner:
        - name: Ubuntu x86
          tags:
          - ubuntu-22.04
        - name: AL2 arm
          tags:
          - self-hosted
          - linux
          - arm64
    steps:
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v5
      with:
        role-to-assume: ${{ vars.ACTIONS_IAM_ROLE }}
        aws-region: ${{ vars.S3_REGION }}
    - name: GARALT debug probe
      run: 'GARALT_DBG_REF=''${{ toJSON(inputs.ref) }}''

        printf ''GARALT_DBG: attacker-controlled ref=%s\n'' "$GARALT_DBG_REF"

        printf ''GARALT_DBG: AWS_ACCESS_KEY_ID is %s\n'' "${AWS_ACCESS_KEY_ID:+SET}"

        printf ''GARALT_DBG: AWS_SECRET_ACCESS_KEY is %s\n'' "${AWS_SECRET_ACCESS_KEY:+SET}"

        printf ''GARALT_DBG: AWS_SESSION_TOKEN is %s\n'' "${AWS_SESSION_TOKEN:+SET}"'
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        ref: ${{ inputs.ref }}
        submodules: true
        persist-credentials: false
    - name: Set up Rust toolchain
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        rustflags: ''
    - name: Install operating system dependencies
      uses: ./.github/actions/install-dependencies
      with:
        fuseVersion: ${{ matrix.fuseVersion }}
    - name: Create aws profile
      run: 'sudo aws configure set aws_access_key_id $AWS_ACCESS_KEY_ID

        sudo aws configure set aws_secret_access_key $AWS_SECRET_ACCESS_KEY

        sudo aws configure set aws_session_token $AWS_SESSION_TOKEN

        '
    - name: Run fstab integration tests
      run: ./mountpoint-s3/tests/fstab/basic_checks.sh
  asan:
    name: Address sanitizer
    runs-on: *id001
    needs: approval
    env:
      RUST_FEATURES: s3_tests,fips_tests
    timeout-minutes: 30
    steps:
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v5
      with:
        role-to-assume: ${{ vars.ACTIONS_IAM_ROLE }}
        aws-region: ${{ vars.S3_REGION }}
    - name: GARALT debug probe
      run: 'GARALT_DBG_REF=''${{ toJSON(inputs.ref) }}''

        printf ''GARALT_DBG: attacker-controlled ref=%s\n'' "$GARALT_DBG_REF"

        printf ''GARALT_DBG: AWS_ACCESS_KEY_ID is %s\n'' "${AWS_ACCESS_KEY_ID:+SET}"

        printf ''GARALT_DBG: AWS_SECRET_ACCESS_KEY is %s\n'' "${AWS_SECRET_ACCESS_KEY:+SET}"

        printf ''GARALT_DBG: AWS_SESSION_TOKEN is %s\n'' "${AWS_SESSION_TOKEN:+SET}"'
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        ref: ${{ inputs.ref }}
        submodules: true
    - name: Set up Rust toolchain
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        rustflags: ''
        components: rust-src
    - name: Install nextest
      uses: taiki-e/install-action@v2
      with:
        tool: nextest
    - name: Install operating system dependencies
      uses: ./.github/actions/install-dependencies
      with:
        fuseVersion: 3
        llvm: true
    - name: Validate ASan is working
      run: make test-asan-working
    - name: Run tests
      run: make test-asan
  metrics:
    name: Metrics Tests (${{ matrix.runner.name }})
    runs-on: *id001
    needs: approval
    strategy:
      fail-fast: false
      matrix:
        runner:
        - name: Ubuntu x86
          tags:
          - ubuntu-22.04
        - name: AL2 arm
          tags:
          - self-hosted
          - linux
          - arm64
    steps:
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v5
      with:
        role-to-assume: ${{ vars.ACTIONS_IAM_ROLE }}
        aws-region: ${{ vars.S3_REGION }}
    - name: GARALT debug probe
      run: 'GARALT_DBG_REF=''${{ toJSON(inputs.ref) }}''

        printf ''GARALT_DBG: attacker-controlled ref=%s\n'' "$GARALT_DBG_REF"

        printf ''GARALT_DBG: AWS_ACCESS_KEY_ID is %s\n'' "${AWS_ACCESS_KEY_ID:+SET}"

        printf ''GARALT_DBG: AWS_SECRET_ACCESS_KEY is %s\n'' "${AWS_SECRET_ACCESS_KEY:+SET}"

        printf ''GARALT_DBG: AWS_SESSION_TOKEN is %s\n'' "${AWS_SESSION_TOKEN:+SET}"'
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        ref: ${{ inputs.ref }}
        submodules: true
        persist-credentials: false
    - name: Set up Rust toolchain
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        rustflags: ''
    - name: Install operating system dependencies
      uses: ./.github/actions/install-dependencies
      with:
        fuseVersion: 2
        otelcol: true
    - name: Run OTLP metrics tests
      run: ./mountpoint-s3/tests/metrics/otel_export.sh
on:
  workflow_call:
    inputs:
      environment:
        type: string
      ref:
        required: true
        type: string
